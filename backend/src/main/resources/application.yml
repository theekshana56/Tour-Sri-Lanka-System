server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/tsldb}
  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password: ${RESEND_API_KEY:placeholder}
    protocol: smtps
    from: bookings@tsl.lk
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true

app:
  jwt:
    secret: ${JWT_SECRET:tsl-super-secret-key-change-in-production-must-be-256-bits}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:placeholder}
    api-key: ${CLOUDINARY_API_KEY:placeholder}
    api-secret: ${CLOUDINARY_API_SECRET:placeholder}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  admin-emails:
    - admin@tsl.lk

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
